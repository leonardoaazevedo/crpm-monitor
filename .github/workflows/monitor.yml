name: Monitor CPRM

on:
  schedule:
    - cron: "*/5 * * * *"  # a cada 5 minutos
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: python monitor.py

      - name: Commit estado atualizado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add estado_cprm.json
          git commit -m "update estado" || echo "sem mudanças"
          git push